name: Staging Build

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

jobs:
  build-staging:
    name: Build Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build for staging
      run: pnpm run build:staging

    - name: Get version from package.json
      id: package_version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

    - name: Set version tag format for staging
      run: echo "VERSION_TAG=v${VERSION}-rc.$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

    - name: Upload version info
      run: |
        echo "App Version: ${{ env.VERSION_TAG }}" > version.txt
        echo "Build Date: $(date -u)" >> version.txt
        echo "Commit: ${{ github.sha }}" >> version.txt

    - name: Include version file in artifacts
      run: cp version.txt dist-staging/

    - name: Upload staging build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: staging-build
        path: dist-staging
        retention-days: 5